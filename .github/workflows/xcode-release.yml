name: Xcode Release

on:
  push:
    branches:
      - main
    paths:
      - "LegacyVaultAI/**"
      - "LegacyVaultAI.xcodeproj/**"
      - ".github/workflows/xcode-release.yml"
  pull_request:
    paths:
      - "LegacyVaultAI/**"
      - "LegacyVaultAI.xcodeproj/**"
      - ".github/workflows/xcode-release.yml"
  workflow_dispatch:
    inputs:
      upload_to_app_store_connect:
        description: "Archive and upload the signed iOS build to App Store Connect"
        required: true
        type: boolean
        default: true
      attach_to_app_version:
        description: "Attach the uploaded build to iOS App Version 1.0 after processing"
        required: true
        type: boolean
        default: true
      marketing_version:
        description: "CFBundleShortVersionString / App Store version"
        required: true
        default: "1.0"
      build_number:
        description: "Optional CFBundleVersion. Defaults to the GitHub run number."
        required: false
        default: ""

permissions:
  contents: read

env:
  PROJECT_PATH: LegacyVaultAI.xcodeproj
  SCHEME: LegacyVaultAI
  CONFIGURATION: Release
  BUNDLE_IDENTIFIER: com.legacyvaultai.app
  APP_NAME: LegacyVault AI
  ARCHIVE_PATH: ${{ github.workspace }}/build/LegacyVaultAI.xcarchive
  EXPORT_PATH: ${{ github.workspace }}/build/export
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || secrets.DEVELOPMENT_TEAM }}
  ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID || secrets.APP_STORE_CONNECT_API_KEY_ID || secrets.APP_STORE_CONNECT_KEY_ID || secrets.APPSTORE_API_KEY_ID }}
  ASC_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID || secrets.APP_STORE_CONNECT_API_ISSUER_ID || secrets.APP_STORE_CONNECT_ISSUER_ID || secrets.APPSTORE_ISSUER_ID }}
  ASC_PRIVATE_KEY: ${{ secrets.ASC_API_PRIVATE_KEY || secrets.APP_STORE_CONNECT_API_PRIVATE_KEY || secrets.APP_STORE_CONNECT_PRIVATE_KEY || secrets.APPSTORE_API_PRIVATE_KEY }}
  ASC_PRIVATE_KEY_BASE64: ${{ secrets.ASC_API_PRIVATE_KEY_BASE64 || secrets.APP_STORE_CONNECT_API_PRIVATE_KEY_BASE64 || secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 || secrets.APP_STORE_CONNECT_API_KEY_BASE64 || secrets.APPSTORE_API_PRIVATE_KEY_BASE64 }}
  BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 || secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 || secrets.IOS_CERTIFICATE_P12_BASE64 || secrets.DISTRIBUTION_CERTIFICATE_BASE64 || secrets.APPLE_CERTIFICATE_BASE64 }}
  P12_PASSWORD: ${{ secrets.P12_PASSWORD || secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD || secrets.IOS_CERTIFICATE_PASSWORD || secrets.DISTRIBUTION_CERTIFICATE_PASSWORD || secrets.APPLE_CERTIFICATE_PASSWORD }}
  BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 || secrets.IOS_PROVISION_PROFILE_BASE64 || secrets.IOS_PROFILE_BASE64 || secrets.PROVISIONING_PROFILE_BASE64 || secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

jobs:
  simulator-build:
    name: Build for iOS Simulator
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          if compgen -G "/Applications/Xcode_26*.app" > /dev/null; then
            XCODE_PATH="$(ls -d /Applications/Xcode_26*.app | sort | tail -n 1)"
          elif [ -d "/Applications/Xcode.app" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          else
            XCODE_PATH="$(ls -d /Applications/Xcode*.app | sort | tail -n 1)"
          fi
          echo "Selecting $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Show project schemes
        run: xcodebuild -list -project "$PROJECT_PATH"

      - name: Build unsigned simulator app
        run: |
          set -euo pipefail
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO

  archive-upload:
    name: Archive and Upload to App Store Connect
    runs-on: macos-26
    timeout-minutes: 75
    needs: simulator-build
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[upload-testflight]'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          if compgen -G "/Applications/Xcode_26*.app" > /dev/null; then
            XCODE_PATH="$(ls -d /Applications/Xcode_26*.app | sort | tail -n 1)"
          elif [ -d "/Applications/Xcode.app" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          else
            XCODE_PATH="$(ls -d /Applications/Xcode*.app | sort | tail -n 1)"
          fi
          echo "Selecting $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Prepare build number
        run: |
          set -euo pipefail
          MARKETING_VERSION="${{ github.event.inputs.marketing_version }}"
          BUILD_NUMBER="${{ github.event.inputs.build_number }}"
          if [ -z "$MARKETING_VERSION" ]; then
            MARKETING_VERSION="1.0"
          fi
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="$GITHUB_RUN_NUMBER"
          fi
          echo "MARKETING_VERSION=$MARKETING_VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "Using marketing version $MARKETING_VERSION and build number $BUILD_NUMBER"

      - name: Validate release secrets
        run: |
          set -euo pipefail
          missing=0
          for name in APPLE_TEAM_ID ASC_KEY_ID ASC_ISSUER_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required."
              missing=1
            fi
          done
          if [ -z "${ASC_PRIVATE_KEY:-}" ] && [ -z "${ASC_PRIVATE_KEY_BASE64:-}" ]; then
            echo "::error::ASC_PRIVATE_KEY or ASC_PRIVATE_KEY_BASE64 is required."
            missing=1
          fi
          if [ -n "${BUILD_CERTIFICATE_BASE64:-}" ] && [ -z "${P12_PASSWORD:-}" ]; then
            echo "::error::P12_PASSWORD is required when BUILD_CERTIFICATE_BASE64 is provided."
            missing=1
          fi
          exit "$missing"

      - name: Write App Store Connect API key
        run: |
          set -euo pipefail
          PRIVATE_KEYS_DIR="$HOME/.appstoreconnect/private_keys"
          API_KEY_PATH="$PRIVATE_KEYS_DIR/AuthKey_${ASC_KEY_ID}.p8"
          mkdir -p "$PRIVATE_KEYS_DIR"

          if [ -n "${ASC_PRIVATE_KEY_BASE64:-}" ]; then
            printf "%s" "$ASC_PRIVATE_KEY_BASE64" | base64 --decode > "$API_KEY_PATH" 2>/dev/null || \
              printf "%s" "$ASC_PRIVATE_KEY_BASE64" | base64 -D > "$API_KEY_PATH"
          elif printf "%s" "$ASC_PRIVATE_KEY" | grep -q "BEGIN PRIVATE KEY"; then
            printf "%s" "$ASC_PRIVATE_KEY" | python3 -c 'import sys; sys.stdout.write(sys.stdin.read().replace("\\n", "\n"))' > "$API_KEY_PATH"
          else
            printf "%s" "$ASC_PRIVATE_KEY" | base64 --decode > "$API_KEY_PATH" 2>/dev/null || \
              printf "%s" "$ASC_PRIVATE_KEY" | base64 -D > "$API_KEY_PATH"
          fi

          chmod 600 "$API_KEY_PATH"
          echo "ASC_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"
          echo "ASC_PRIVATE_KEYS_DIR=$PRIVATE_KEYS_DIR" >> "$GITHUB_ENV"

      - name: Install signing certificate and provisioning profile
        if: env.BUILD_CERTIFICATE_BASE64 != ''
        run: |
          set -euo pipefail

          decode_secret() {
            local value="$1"
            local output="$2"
            printf "%s" "$value" | base64 --decode > "$output" 2>/dev/null || printf "%s" "$value" | base64 -D > "$output"
          }

          CERTIFICATE_PATH="$RUNNER_TEMP/distribution.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASS="${KEYCHAIN_PASSWORD:-$(uuidgen)}"

          decode_secret "$BUILD_CERTIFICATE_BASE64" "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          if [ -n "${BUILD_PROVISION_PROFILE_BASE64:-}" ]; then
            PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
            decode_secret "$BUILD_PROVISION_PROFILE_BASE64" "$PROFILE_PATH"
            mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
            security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
            PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")
            PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/profile.plist")
            cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
            echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          fi
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Create export options
        run: |
          set -euo pipefail
          mkdir -p build
          if [ -n "${PROFILE_NAME:-}" ]; then
            SIGNING_STYLE="manual"
            PROFILE_BLOCK="<key>provisioningProfiles</key><dict><key>${BUNDLE_IDENTIFIER}</key><string>${PROFILE_NAME}</string></dict>"
          else
            SIGNING_STYLE="automatic"
            PROFILE_BLOCK=""
          fi

          cat > build/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>${SIGNING_STYLE}</string>
            ${PROFILE_BLOCK}
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Archive iOS app
        run: |
          set -euo pipefail
          mkdir -p build
          SIGNING_ARGS=(CODE_SIGN_STYLE=Automatic)
          if [ -n "${PROFILE_NAME:-}" ]; then
            SIGNING_ARGS=(CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="Apple Distribution" PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME")
          fi

          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_API_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_IDENTIFIER" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            "${SIGNING_ARGS[@]}" 2>&1 | tee build/archive.log

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist build/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_API_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" 2>&1 | tee build/export.log

          IPA_PATH="$(find "$EXPORT_PATH" -maxdepth 1 -name "*.ipa" -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA was exported."
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: LegacyVaultAI-${{ github.run_number }}-ipa
          path: |
            ${{ env.EXPORT_PATH }}/*.ipa
            build/*.log
            build/ExportOptions.plist
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload IPA to App Store Connect
        if: >-
          github.event_name == 'push' ||
          github.event.inputs.upload_to_app_store_connect == 'true'
        run: |
          set -euo pipefail
          API_PRIVATE_KEYS_DIR="$ASC_PRIVATE_KEYS_DIR" xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Attach build to App Store version
        if: >-
          github.event_name == 'push' ||
          (github.event.inputs.upload_to_app_store_connect == 'true' &&
            github.event.inputs.attach_to_app_version == 'true')
        run: |
          set -euo pipefail
          python3 -m venv "$RUNNER_TEMP/asc-venv"
          source "$RUNNER_TEMP/asc-venv/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install pyjwt cryptography

          python <<'PY'
          import json
          import os
          import time
          import urllib.parse
          import urllib.request
          from pathlib import Path

          import jwt

          key_id = os.environ["ASC_KEY_ID"]
          issuer_id = os.environ["ASC_ISSUER_ID"]
          key_path = Path(os.environ["ASC_API_KEY_PATH"])
          bundle_id = os.environ["BUNDLE_IDENTIFIER"]
          marketing_version = os.environ["MARKETING_VERSION"]
          build_number = os.environ["BUILD_NUMBER"]
          token = jwt.encode(
              {
                  "iss": issuer_id,
                  "iat": int(time.time()) - 60,
                  "exp": int(time.time()) + 20 * 60,
                  "aud": "appstoreconnect-v1",
              },
              key_path.read_text(),
              algorithm="ES256",
              headers={"kid": key_id, "typ": "JWT"},
          )

          base_url = "https://api.appstoreconnect.apple.com/v1"

          def request(method, path, payload=None):
              data = None if payload is None else json.dumps(payload).encode()
              req = urllib.request.Request(
                  f"{base_url}{path}",
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "Accept": "application/json",
                  },
              )
              with urllib.request.urlopen(req, timeout=60) as response:
                  raw = response.read().decode()
                  return {} if raw == "" else json.loads(raw)

          app_query = urllib.parse.urlencode({"filter[bundleId]": bundle_id, "limit": "1"})
          apps = request("GET", f"/apps?{app_query}").get("data", [])
          if not apps:
              raise SystemExit(f"No App Store Connect app found for bundle id {bundle_id}")
          app_id = apps[0]["id"]

          version_query = urllib.parse.urlencode(
              {
                  "filter[platform]": "IOS",
                  "filter[versionString]": marketing_version,
                  "limit": "10",
              }
          )
          versions = request("GET", f"/apps/{app_id}/appStoreVersions?{version_query}").get("data", [])
          if not versions:
              raise SystemExit(f"No iOS App Store version {marketing_version} found")
          version_id = versions[0]["id"]

          build_id = ""
          state = ""
          for attempt in range(1, 61):
              build_query = urllib.parse.urlencode(
                  {
                      "filter[app]": app_id,
                      "filter[version]": build_number,
                      "limit": "10",
                  }
              )
              builds = request("GET", f"/builds?{build_query}").get("data", [])
              if builds:
                  build_id = builds[0]["id"]
                  state = builds[0].get("attributes", {}).get("processingState", "")
                  if state == "VALID":
                      break
              print(f"Waiting for build {build_number} to become VALID (attempt {attempt}/60, state: {state or 'not found'})")
              time.sleep(30)

          if not build_id or state != "VALID":
              raise SystemExit(f"Build {build_number} was not ready to attach. Last state: {state or 'not found'}")

          request(
              "PATCH",
              f"/appStoreVersions/{version_id}/relationships/build",
              {"data": {"type": "builds", "id": build_id}},
          )
          print(f"Attached build {build_number} ({build_id}) to iOS App Store version {marketing_version}.")
          PY

      - name: Clean signing keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
